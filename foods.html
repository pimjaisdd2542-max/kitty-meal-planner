<head>

</head>
<body>

<div class="sidebar-layout">

    <aside class="sidebar">

        <div class="logo">
            🎀 Kitty Planner
        </div>

        <nav class="menu">
            <a href="index.html">🏠 Dashboard</a>

    <main class="page-content">

            id="searchFood"

        >

        <div class="add-food-card">

    <h2>➕ เพิ่มเมนูอาหาร</h2>

    <div class="form-grid">

        <input id="foodName" placeholder="ชื่ออาหาร">

        <input id="foodCalories" type="number" placeholder="Calories">

        <input id="foodCategory" placeholder="Category">

        <input id="foodMealType" placeholder="Meal Type">

        <input id="foodPrepTime" placeholder="Prep Time">

        <input id="foodDifficulty" placeholder="Difficulty">

        <input id="foodImage" type="file">

    <button
        class="primary-btn"
        onclick="addFood()">
        Save Food
    </button>

</div>

<div id="foods"></div>

    </main>
